spring.application.name=food-ordering-app

# H2 in-memory DB for quick local testing (switch to MySQL below for real use)
spring.datasource.url=jdbc:h2:mem:fooddb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- MySQL config (uncomment and update to use real DB) ---
# spring.datasource.url=jdbc:mysql://localhost:3306/food_ordering_db
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

server.port=8080
